components:
  parameters:
    authorization:
      name: authorization
      in: header
      required: true
      style: simple
      explode: false
      description: Authentication Token
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJTU0NjY3NDk2MH0.KVt...
      schema:
        type: string
    page:
      name: page
      in: query
      required: true
      style: form
      explode: true
      description: Page
      schema:
        minimum: 1
        type: number
        format: int32
    pageSize:
      name: pageSize
      in: query
      required: true
      style: form
      explode: true
      description: Page Size. Max. page size is 200.
      schema:
        minimum: 1
        type: number
        format: int32
    sortBy:
      name: sortBy
      in: query
      required: false
      style: form
      explode: true
      description: Sort By Field
      example: name
      schema:
        type: string
    sortDirection:
      name: sortDirection
      in: query
      required: false
      style: form
      explode: true
      description: Sort Direction [ASC/DESC]
      example: ASC
      schema:
        type: string
    q:
      name: q
      in: query
      required: false
      style: form
      explode: true
      description: Filter Query
      schema:
        type: string
    isPrinted:
      name: isPrinted
      in: query
      required: false
      style: form
      explode: true
      description: >-
        Whether the shipping label is already printed or not, 1 indicates that
        it has not yet been printed, while 2 indicates that it has already been
        printed.
      schema:
        type: string
    value:
      name: value
      in: query
      required: false
      style: form
      description: Value (SO Number)
      schema:
        type: string
    wms:
      name: wms
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: string
    transactionDateFrom:
      name: transactionDateFrom
      in: query
      required: false
      style: form
      explode: true
      description: The Transaction Date From
      schema:
        type: string
        format: date ISO UTC
    transactionDateTo:
      name: transactionDateTo
      in: query
      required: false
      style: form
      explode: true
      description: The Transaction Date To
      schema:
        type: string
        format: date ISO UTC
    csv:
      name: csv
      in: query
      required: false
      style: form
      explode: true
      description: Get Response as CSV File
      example: true
      schema:
        type: string
    createdSince:
      name: createdSince
      in: query
      required: false
      style: form
      explode: true
      description: Created Since
      schema:
        type: string
        format: date
    dateTo:
      name: dateTo
      in: query
      required: false
      style: form
      explode: true
      description: The Date To
      schema:
        type: string
        format: date
    channelId:
      name: channelId
      in: query
      description: Item on Channel ID
      schema:
        type: number
        format: int32
    isFavourite:
      name: isFavourite
      in: query
      description: Whether the item is favourite item
      schema:
        type: boolean
        example: true
    type:
      name: type
      in: query
      required: true
      style: form
      schema:
        type: string
        example: notBundle
    locationId:
      name: locationId
      in: query
      required: true
      style: form
      description: Place/Location To Do Stock Opname
      schema:
        type: number
        example: 1
    floorId:
      name: floorId
      in: query
      required: true
      style: form
      description: Rack Location by Floor
      schema:
        type: number
        example: 1
    rowIds:
      name: rowIds
      in: query
      required: true
      style: form
      description: Rack Location by row
      schema:
        type: string
        example: '[%20%201]'
    statusOpname:
      name: status
      in: query
      required: true
      style: form
      description: >-
        Opname Progress Status (Fill with one of these status; created,
        on_process, finalized).
      schema:
        type: string
        example: created
    isRealTimeStock:
      name: isRealTimeStock
      in: query
      required: true
      style: form
      schema:
        type: boolean
        example: true
    rowIds5B05D:
      name: rowIds%5B0%5D
      in: query
      required: true
      schema:
        type: number
        example: 1
    collIds5B05D:
      name: collIds%5B0%5D
      in: query
      required: true
      schema:
        type: number
        example: 1
    tz:
      name: tz
      in: query
      description: default value, use the example.
      required: true
      schema:
        type: string
        example: Asia%2FBangkok
    warehouse:
      name: wms
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: string
    ids5B05D-invoicepacklist:
      name: ids%5B0%5D
      in: query
      description: use id which id generated from POST/sales/packlists/create-invoice
      required: true
      schema:
        type: number
        example: 5479
    ids5B05D-getReportsPurchaseOrderDetail:
      name: ids%5B0%5D
      in: query
      description: Purchase Order ID
      required: true
      schema:
        type: number
        example: 5479
    ids_opnameheaderid:
      name: ids
      in: query
      required: true
      style: form
      description: Opname Header ID
      schema:
        type: number
        example: 3
    ids5B05D-getReportsShippingManifest:
      name: ids%5B0%5D
      in: query
      description: Shipment Header ID
      required: true
      schema:
        type: number
        example: 5479
    dateFrom:
      name: dateFrom
      in: query
      required: false
      style: form
      explode: true
      description: The Date From
      schema:
        type: string
        format: date
    ids5B05D-getReportsPicklist:
      name: ids%5B0%5D
      in: query
      description: Picklist ID
      required: true
      schema:
        type: number
        example: 5479
