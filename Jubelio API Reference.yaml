      ### **Packing Process**

      The following outlines the flow for the packing process: <br><br>

       ![](https://assets-alpha.ass8c.upcloudobjects.com/null/images/1742799849892_0ebc3bec-cc65-43ad-b1ea-e4bcc6ad5146.jpeg)

